## Integration-test compose file (used by EjbcaContainerIT via Testcontainers)
##
## Key differences from docker-compose.yml:
##   - No fixed host port bindings → Testcontainers maps to random ephemeral ports
##     (avoids conflicts with a running dev stack)
##   - No build: block → uses the pre-built image directly
##   - ejbca-ts volume mounted at /mnt/external/secrets/tls/ts/ so that after the
##     first boot EjbcaContainerIT can write a truststore containing ManagementCA,
##     matching the importAppserverTruststore pattern from the Helm chart

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ejbca
      POSTGRES_USER: ejbca
      POSTGRES_PASSWORD: ejbca
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ejbca"]
      interval: 10s
      timeout: 5s
      retries: 12

  ejbca:
    image: ghcr.io/thpham/ejbca-ce:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_JDBC_URL:    "jdbc:postgresql://postgres:5432/ejbca"
      DATABASE_USER:        ejbca
      DATABASE_PASSWORD:    ejbca
      TLS_SETUP_ENABLED:    "simple"
      EJBCA_ADMIN_ALLOW_ANY_IP: "true"
      # SoftHSMv3 token credentials (used by init-softhsm.sh)
      SOFTHSM_TOKEN_LABEL:  "TestToken"
      SOFTHSM_TOKEN_PIN:    "1234"
      SOFTHSM_TOKEN_SO_PIN: "12345678"
    ports:
      - "8443"   # mapped to a random host port by Docker; use getServicePort("ejbca", 8443)
    volumes:
      - softhsm-tokens:/var/lib/softhsmv3/tokens
      - ejbca-p12:/opt/keyfactor/ejbca/p12
      - ejbca-ts:/mnt/external/secrets/tls/ts
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost:8443/ejbca/publicweb/healthcheck/ejbcahealth"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

volumes:
  postgres-data:
  softhsm-tokens:
  ejbca-p12:
  ejbca-ts:
